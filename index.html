<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 確保手機版正確縮放比例 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雙中慧成宮 - 專屬讀書籤詩</title>

    <!-- 💡 修正問題2 (字體跑掉)：使用 link 確保所有手機瀏覽器優先且穩定地載入字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;700&display=swap" rel="stylesheet">

    <!-- 載入 Tailwind CSS 與 html2canvas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        /* 💡 修正問題2 (字體跑掉)：強制綁定 font-wenkai，加入 !important 讓 iOS Safari 乖乖聽話 */
        .font-wenkai {
            font-family: 'LXGW WenKai TC', 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', serif !important;
        }

        /* 籤筒搖晃動畫 */
        @keyframes shake {
            0%, 100% { transform: rotate(0deg) translateX(0); }
            25% { transform: rotate(-5deg) translateX(-2px); }
            75% { transform: rotate(5deg) translateX(2px); }
        }
        .animate-shake {
            animation: shake 0.4s infinite ease-in-out;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'temple-red': '#8B0000',
                        'temple-text': '#333333'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#FDFBF7] min-h-screen flex items-center justify-center p-4">

    <!-- 截圖主容器 -->
    <main id="mainContainer" class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 relative">
        <!-- 頂部紅條 -->
        <div class="h-3 bg-temple-red w-full"></div>

        <div class="p-6 md:p-8 text-center" id="appContent">
            
            <!-- ====== 狀態 1：首頁 ====== -->
            <div id="homeState" class="block py-10">
                <h1 class="text-4xl font-bold font-wenkai text-temple-red mb-10 tracking-widest">雙中慧成宮</h1>
                <button onclick="startDraw()" class="bg-temple-red text-white font-wenkai text-xl py-3 px-10 rounded-full shadow-lg hover:bg-red-800 transition-colors tracking-widest">
                    誠心求籤
                </button>
            </div>

            <!-- ====== 狀態 2：動畫中 (籤筒) ====== -->
            <div id="loadingState" class="hidden py-10">
                
                <!-- 💡 修正問題1 (春聯跑版)：重構籤筒結構，使用 text-orientation: upright 拯救 iOS 直排問題 -->
                <div class="relative w-28 h-36 bg-[#8B4513] rounded-b-2xl mx-auto shadow-xl flex justify-center border-t-8 border-[#5C2E0B] animate-shake">
                    <!-- 後方籤支 -->
                    <div class="absolute -top-10 left-4 w-2 h-16 bg-[#FCD34D] transform -rotate-12 rounded-t-sm shadow-sm"></div>
                    <div class="absolute -top-14 left-12 w-2.5 h-20 bg-[#FBBF24] rounded-t-sm shadow-sm"></div>
                    
                    <!-- 帶紅頭的籤支 -->
                    <div class="absolute -top-12 right-6 w-2 h-16 bg-[#FCD34D] transform rotate-12 rounded-t-sm">
                        <!-- 紅色火柴頭 -->
                        <div class="absolute -top-3 left-0 w-2.5 h-4 bg-red-500 rounded-sm -ml-[1px]"></div>
                    </div>
                    
                    <!-- 正前方紅色春聯條 -->
                    <div class="w-8 h-28 bg-[#CC0000] mt-2 shadow-md flex items-center justify-center border border-red-800/30 relative z-10">
                        <!-- 關鍵修復：writing-mode 加上 text-orientation: upright -->
                        <span class="text-[#FCD34D] font-bold text-[15px] tracking-widest font-wenkai" style="writing-mode: vertical-rl; text-orientation: upright; letter-spacing: 0.2em;">雙中慧成宮</span>
                    </div>
                </div>

                <p class="mt-12 text-temple-red font-wenkai text-xl tracking-widest animate-pulse">考神賜籤中...</p>
            </div>

            <!-- ====== 狀態 3：抽籤結果 (保留之前的修正) ====== -->
            <div id="resultState" class="hidden">
                <!-- 專屬宮廟字樣 -->
                <div class="text-temple-red font-bold text-xl mb-3 tracking-widest font-wenkai opacity-90 border-b-2 border-temple-red/20 pb-2 inline-block">雙中慧成宮</div>

                <p id="fortuneId" class="text-sm text-gray-400 mb-1 font-sans mt-2">第 2 籤</p>
                <h2 id="fortuneLevel" class="text-4xl font-black text-temple-red mb-4 tracking-widest block font-wenkai">【 中吉 】</h2>
                
                <!-- 主題標籤：保持 inline-flex 以完美垂直置中 -->
                <div class="inline-flex items-center justify-center bg-temple-red text-white text-sm px-4 py-1.5 rounded-full mt-2 mb-8 font-sans tracking-wider shadow-sm" style="line-height: normal;" id="fortuneTheme">
                    🔖 專屬主題：讀書方法
                </div>

                <!-- 籤詩內文 -->
                <div id="fortunePoem" class="font-wenkai text-2xl font-bold leading-loose text-temple-text mb-8 tracking-widest flex flex-col items-center gap-2">
                    <!-- 動態填入 -->
                </div>

                <!-- 解曰 -->
                <div class="text-left border-t border-gray-200 pt-6 mt-4">
                    <h3 class="text-xl font-bold text-temple-red mb-3 border-b-2 border-temple-red inline-block pb-1 font-wenkai">解曰</h3>
                    <p id="fortuneExplain" class="text-gray-600 font-wenkai leading-relaxed text-lg"></p>
                </div>
            </div>
            
            <!-- 版權浮水印 (截圖時顯示) -->
            <div id="exportCopyright" class="hidden mt-6 text-xs text-gray-300 font-sans text-center">
                © 專屬雙中的100首讀書籤詩
            </div>
        </div>
    </main>

    <!-- 底部按鈕區 (截圖時會隱藏) -->
    <div id="actionButtons" class="hidden fixed bottom-6 left-0 right-0 flex justify-center gap-4 px-4 z-50">
        <button onclick="resetApp()" class="bg-white text-gray-600 border border-gray-300 font-wenkai py-3 px-6 rounded-full shadow-lg hover:bg-gray-50 transition-colors">
            重新求籤
        </button>
        <button id="downloadBtn" onclick="downloadImage()" class="bg-temple-red text-white font-wenkai py-3 px-8 rounded-full shadow-lg hover:bg-red-800 transition-colors flex items-center gap-2">
            <svg xmlns="http://www.w3.org/polygons" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
            下載籤詩
        </button>
    </div>

    <script>
        // 模擬的籤詩資料 (請替換為您的 100 首陣列)
        const fortunes = [
            {
                id: "第 2 籤",
                level: "【 中吉 】",
                theme: "🔖 專屬主題：讀書方法",
                poem: ["書山有路勤為徑", "學海無涯苦作舟", "循序漸進莫心急", "自有碩果滿枝頭"],
                explain: "讀書沒有捷徑。只要按部就班複習，把基礎打穩，不要好高騖遠，成績自然會穩步提升。"
            }
        ];

        const homeState = document.getElementById('homeState');
        const loadingState = document.getElementById('loadingState');
        const resultState = document.getElementById('resultState');
        const actionButtons = document.getElementById('actionButtons');

        function startDraw() {
            homeState.classList.add('hidden');
            loadingState.classList.remove('hidden');
            loadingState.classList.add('flex', 'flex-col', 'items-center');

            // 模擬搖籤筒 2 秒
            setTimeout(() => {
                showResult();
            }, 2000);
        }

        function showResult() {
            loadingState.classList.add('hidden');
            loadingState.classList.remove('flex');
            
            // 填入資料 (此處以第一首為例)
            const data = fortunes[0];
            document.getElementById('fortuneId').textContent = data.id;
            document.getElementById('fortuneLevel').textContent = data.level;
            document.getElementById('fortuneTheme').textContent = data.theme;
            
            const poemContainer = document.getElementById('fortunePoem');
            poemContainer.innerHTML = '';
            data.poem.forEach(line => {
                const p = document.createElement('p');
                p.textContent = line;
                poemContainer.appendChild(p);
            });
            
            document.getElementById('fortuneExplain').textContent = data.explain;

            resultState.classList.remove('hidden');
            actionButtons.classList.remove('hidden');
        }

        function resetApp() {
            resultState.style.animation = '';
            resultState.style.opacity = '';
            resultState.style.transform = '';
            
            resultState.classList.add('hidden');
            actionButtons.classList.add('hidden');
            homeState.classList.remove('hidden');
        }

        function downloadImage() {
            const captureTarget = document.getElementById('mainContainer');
            const copyright = document.getElementById('exportCopyright');
            const btn = document.getElementById('downloadBtn');
            const originalHTML = btn.innerHTML;
            
            btn.innerHTML = '處理中...';
            btn.disabled = true;
            actionButtons.style.display = 'none';
            copyright.classList.remove('hidden');
            copyright.classList.add('block');
            
            resultState.style.animation = 'none';
            resultState.style.opacity = '1';
            resultState.style.transform = 'none';
            
            document.fonts.ready.then(() => {
                html2canvas(captureTarget, { 
                    scale: 3,
                    useCORS: true,
                    backgroundColor: "#ffffff",
                    logging: false
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `雙中慧成宮_${document.getElementById('fortuneId').textContent}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                    actionButtons.style.display = 'flex';
                    copyright.classList.remove('block');
                    copyright.classList.add('hidden');
                });
            });
        }
    </script>
</body>
</html>
