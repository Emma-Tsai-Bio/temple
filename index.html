<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雙中慧成宮 - 專屬讀書籤詩</title>

    <!-- 載入字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;700&display=swap" rel="stylesheet">

    <!-- 載入 Tailwind CSS 與 html2canvas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-family: "LXGW WenKai TC", "PingFang TC", "Heiti TC", "Microsoft JhengHei", serif;
        }

        .font-wenkai {
            font-family: "LXGW WenKai TC", "PingFang TC", "Heiti TC", "Microsoft JhengHei", serif !important;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg) translateX(0); }
            25% { transform: rotate(-5deg) translateX(-2px); }
            75% { transform: rotate(5deg) translateX(2px); }
        }
        .animate-shake {
            animation: shake 0.4s infinite ease-in-out;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'temple-red': '#8B0000',
                        'temple-text': '#333333'
                    },
                    fontFamily: {
                        'wenkai': ['"LXGW WenKai TC"', 'serif']
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#FDFBF7] min-h-screen flex flex-col items-center justify-center select-none">

    <div id="captureWrapper" class="w-full max-w-md p-5 bg-[#FDFBF7] flex flex-col items-center">
        <main id="mainContainer" class="w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 relative">
            <div class="h-3 bg-temple-red w-full"></div>

            <div class="p-6 md:p-8 text-center" id="appContent">
                
                <div id="homeState" class="block py-6">
                    <div class="mb-4 flex justify-center text-7xl drop-shadow-md">
                        ⛩️
                    </div>
                    <h1 class="text-3xl font-bold font-wenkai text-temple-red mb-4 tracking-widest">📖 讀書運勢求籤筒</h1>
                    <p class="text-gray-600 mb-8 font-wenkai text-lg leading-relaxed">在心中默念你近期的學習煩惱，<br>然後點擊按鈕求籤。</p>
                    
                    <button onclick="startDraw()" class="bg-temple-red text-white font-wenkai text-xl py-3 px-10 rounded-full shadow-lg hover:bg-red-800 transition-colors tracking-widest">
                        誠心求籤
                    </button>
                </div>

                <div id="loadingState" class="hidden py-10">
                    <!-- 💡 籤筒與籤的終極圖層解法：將它們拆為平行的區塊，讓前面的籤筒蓋住後面的竹籤 -->
                    <div class="relative w-28 h-36 mx-auto animate-shake">
                        
                        <!-- 1. 竹籤層 (在程式碼最前面，自然在底層) -->
                        <div class="absolute -top-10 left-4 w-2 h-16 bg-[#FCD34D] transform -rotate-12 rounded-t-sm shadow-sm">
                            <div class="absolute top-0 left-0 w-full h-3 bg-red-500 rounded-t-sm"></div>
                        </div>
                        
                        <div class="absolute -top-14 left-12 w-2.5 h-20 bg-[#FBBF24] rounded-t-sm shadow-sm">
                            <div class="absolute top-0 left-0 w-full h-3.5 bg-red-500 rounded-t-sm"></div>
                        </div>
                        
                        <div class="absolute -top-12 right-6 w-2 h-16 bg-[#FCD34D] transform rotate-12 rounded-t-sm">
                            <div class="absolute top-0 left-0 w-full h-3 bg-red-500 rounded-t-sm"></div>
                        </div>
                        
                        <!-- 2. 籤筒本體層 (蓋在竹籤下半部之上) -->
                        <div class="absolute inset-0 bg-[#8B4513] rounded-b-2xl shadow-xl flex justify-center border-t-8 border-[#5C2E0B] z-10">
                            <!-- 紅色標籤 -->
                            <div class="w-8 bg-[#CC0000] mt-2 shadow-md flex flex-col items-center justify-center border border-red-800/30 py-2 gap-[1px]">
                                <span class="text-[#FCD34D] font-bold text-[13px] leading-none font-wenkai">雙</span>
                                <span class="text-[#FCD34D] font-bold text-[13px] leading-none font-wenkai">中</span>
                                <span class="text-[#FCD34D] font-bold text-[13px] leading-none font-wenkai">慧</span>
                                <span class="text-[#FCD34D] font-bold text-[13px] leading-none font-wenkai">成</span>
                                <span class="text-[#FCD34D] font-bold text-[13px] leading-none font-wenkai">宮</span>
                            </div>
                        </div>
                    </div>
                    <p class="mt-12 text-temple-red font-wenkai text-xl tracking-widest animate-pulse">考神賜籤中...</p>
                </div>

                <div id="resultState" class="hidden">
                    <div class="text-temple-red font-bold text-xl mb-3 tracking-widest font-wenkai opacity-90 border-b-2 border-temple-red/20 pb-2 inline-block">雙中慧成宮</div>

                    <p id="fortuneId" class="text-sm text-gray-400 mb-1 font-sans mt-2"></p>
                    <h2 id="fortuneLevel" class="text-4xl font-black text-temple-red tracking-widest block font-wenkai"></h2>
                    
                    <!-- 💡 終極置中解法 2.0 (針對 html2canvas 跑版問題)：
                         1. 用實體空白 div 撐開距離，絕對不使用 margin，防止套件算錯位置導致紅框往上飄。
                         2. 外層改用 text-center，放棄 flex 排版。
                         3. 內層放棄固定 height/line-height，單純用 padding 讓文字與背景自然撐開垂直置中。
                    -->
                    <div style="height: 24px; width: 100%;"></div>
                    
                    <div class="w-full text-center block">
                        <div id="fortuneTheme" class="bg-temple-red text-white text-sm font-sans tracking-wider inline-block shadow-sm whitespace-nowrap" style="border-radius: 9999px; padding: 8px 24px; line-height: 1.5; vertical-align: middle;"></div>
                    </div>

                    <div style="height: 28px; width: 100%;"></div>

                    <div id="fortunePoem" class="font-wenkai text-2xl font-bold leading-loose text-temple-text mb-8 tracking-widest flex flex-col items-center gap-2"></div>

                    <div class="text-left border-t border-gray-200 pt-6 mt-4">
                        <h3 class="text-xl font-bold text-temple-red mb-3 border-b-2 border-temple-red inline-block pb-1 font-wenkai">解曰</h3>
                        <p id="fortuneExplanation" class="text-gray-600 font-wenkai leading-relaxed text-lg"></p>
                    </div>
                </div>
                
                <div id="exportCopyright" class="hidden mt-8 mb-2 text-xs text-gray-400 font-sans text-center font-bold tracking-widest">
                    © 專屬雙中的100首讀書籤詩
                </div>
            </div>
        </main>
    </div>

    <div class="mt-4 mb-8 text-center text-gray-400 text-xs font-sans tracking-widest">
        © 專屬雙中的100首讀書籤詩
    </div>

    <div id="actionButtons" class="hidden fixed bottom-6 left-0 right-0 justify-center gap-4 px-4 z-50">
        <button onclick="resetApp()" class="bg-white text-gray-600 border border-gray-300 font-wenkai py-3 px-6 rounded-full shadow-lg hover:bg-gray-50 transition-colors">
            重新求籤
        </button>
        <button id="downloadBtn" onclick="downloadImage()" class="bg-temple-red text-white font-wenkai py-3 px-8 rounded-full shadow-lg hover:bg-red-800 transition-colors flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
            下載籤詩
        </button>
    </div>

    <div id="imageModal" class="hidden fixed inset-0 bg-black/95 z-[100] overflow-y-auto">
        <div class="min-h-screen w-full flex flex-col items-center justify-center p-6 py-12">
            
            <div id="downloadPrompt" class="text-white text-xl font-bold mb-6 font-wenkai animate-bounce tracking-widest text-center shadow-black drop-shadow-md">
                👇 請長按儲存圖片 👇
            </div>
            
            <img id="generatedImg" src="" class="w-full max-w-sm rounded-xl shadow-2xl border border-white/10 pointer-events-auto" style="-webkit-touch-callout: default;" alt="專屬籤詩">
            
            <button onclick="closeModal()" class="mt-10 mb-8 bg-white/20 text-white px-10 py-3 rounded-full font-wenkai text-lg border border-white/40 hover:bg-white/30 transition-colors tracking-widest">
                返回
            </button>
        </div>
    </div>

    <script>
        const fortunes = [
            {
                id: "第 1 籤",
                level: "【 大吉 】",
                theme: "🔖 專屬主題：讀書心態",
                poem: ["學如不及猶恐失", "溫故知新莫遲疑", "心無旁騖勤修練", "金榜題名待有時"],
                explanation: "保持虛心求教的心態，不斷複習舊知識並吸收新知識。只要專心致志，金榜題名指日可待！"
            },
            {
                id: "第 2 籤",
                level: "【 中吉 】",
                theme: "🔖 專屬主題：讀書方法",
                poem: ["書山有路勤為徑", "學海無涯苦作舟", "循序漸進莫心急", "自有碩果滿枝頭"],
                explanation: "讀書沒有捷徑。只要按部就班複習，把基礎打穩，不要好高騖遠，成績自然會穩步提升。"
            }
        ];

        const homeState = document.getElementById('homeState');
        const loadingState = document.getElementById('loadingState');
        const resultState = document.getElementById('resultState');
        const actionButtons = document.getElementById('actionButtons');

        function startDraw() {
            homeState.classList.add('hidden');
            loadingState.classList.remove('hidden');
            loadingState.classList.add('flex', 'flex-col', 'items-center');

            setTimeout(() => {
                showResult();
            }, 2000);
        }

        function showResult() {
            loadingState.classList.add('hidden');
            loadingState.classList.remove('flex');
            
            const randomIndex = Math.floor(Math.random() * fortunes.length);
            const data = fortunes[randomIndex];

            document.getElementById('fortuneId').textContent = data.id;
            document.getElementById('fortuneLevel').textContent = data.level;
            document.getElementById('fortuneTheme').textContent = data.theme;
            
            const poemContainer = document.getElementById('fortunePoem');
            poemContainer.innerHTML = '';
            data.poem.forEach(line => {
                const p = document.createElement('p');
                p.textContent = line;
                poemContainer.appendChild(p);
            });
            
            document.getElementById('fortuneExplanation').textContent = data.explanation;

            resultState.classList.remove('hidden');
            
            actionButtons.classList.remove('hidden');
            actionButtons.classList.add('flex');
        }

        function resetApp() {
            resultState.style.animation = '';
            resultState.style.opacity = '';
            resultState.style.transform = '';
            
            resultState.classList.add('hidden');
            
            actionButtons.classList.add('hidden');
            actionButtons.classList.remove('flex');
            
            homeState.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('imageModal').classList.add('hidden');
            document.getElementById('imageModal').classList.remove('block');
        }

        function downloadImage() {
            const captureTarget = document.getElementById('captureWrapper');
            const copyright = document.getElementById('exportCopyright');
            const btn = document.getElementById('downloadBtn');
            const originalHTML = btn.innerHTML;
            
            const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (navigator.msMaxTouchPoints > 0);
            const promptElement = document.getElementById('downloadPrompt');
            if (isTouchDevice) {
                promptElement.textContent = '👇 請長按儲存圖片 👇';
            } else {
                promptElement.textContent = '👇 請對圖片按右鍵 ➜ 另存圖片 👇';
            }

            btn.innerHTML = '產圖中...';
            btn.disabled = true;
            
            actionButtons.classList.add('hidden');
            actionButtons.classList.remove('flex');
            
            copyright.classList.remove('hidden');
            copyright.classList.add('block');
            
            resultState.style.animation = 'none';
            resultState.style.opacity = '1';
            resultState.style.transform = 'none';
            
            document.fonts.ready.then(() => {
                html2canvas(captureTarget, { 
                    scale: 3, 
                    useCORS: true,
                    backgroundColor: "#FDFBF7", 
                    logging: false
                }).then(canvas => {
                    const imgData = canvas.toDataURL('image/png');
                    document.getElementById('generatedImg').src = imgData;
                    
                    document.getElementById('imageModal').classList.remove('hidden');
                    document.getElementById('imageModal').classList.add('block');
                    
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                    
                    actionButtons.classList.remove('hidden');
                    actionButtons.classList.add('flex');
                    
                    copyright.classList.remove('block');
                    copyright.classList.add('hidden');
                }).catch(err => {
                    alert('圖片產生失敗，請稍後再試！');
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                    
                    actionButtons.classList.remove('hidden');
                    actionButtons.classList.add('flex');
                    
                    copyright.classList.remove('block');
                    copyright.classList.add('hidden');
                });
            });
        }
    </script>
</body>
</html>
